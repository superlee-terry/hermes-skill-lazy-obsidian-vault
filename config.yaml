# Hermes Skill Lazy Obsidian Vault 配置
#
# 标记说明：
#   ✅ 已实现 — VaultConfig.from_file() 实际解析的字段
#   📋 计划中 — 设计阶段预留，当前版本未生效

vault:
  # ✅ Obsidian Vault 根目录
  path: "./vault"
  # ✅ SQLite 索引数据库路径（相对于插件目录）
  db_path: "skill_index.db"
  # 📋 技能文件存放子目录
  skills_dir: "skills"
  # 📋 索引笔记目录
  index_dir: "_index"

# 📋 以下 index 段为计划中功能，当前版本未生效
index:
  # 📋 索引数据库路径（当前使用 vault.db_path）
  db_path: "./mcp-server/skill_index.db"
  # 📋 索引模式: fts | hybrid | semantic
  mode: "hybrid"
  # 📋 是否启用文件监听自动更新
  watch: true
  # 📋 全量重建间隔（秒）
  rebuild_interval: 3600

# 📋 以下 migration 段为计划中功能，当前版本未生效
migration:
  # 📋 原始 Hermes 技能目录
  source: "~/.hermes/skills"
  # 📋 是否保留原始文件
  keep_original: true
  # 📋 分类推断策略: directory | manual | auto
  category_strategy: "directory"

# 📋 以下 mcp 段为计划中功能，当前版本未生效
mcp:
  # 📋 MCP Server 监听配置
  transport: "stdio"
  # 📋 检索结果数量上限
  max_results: 5
  # 📋 相关性阈值（0-1）
  relevance_threshold: 0.3

hermes:
  # ✅ 是否在 system prompt 中包含分类目录
  include_category_index: false
  # ✅ 始终加载的核心技能（不受 lazy loading 影响）
  always_load:
    - "brainstorming"
    - "debugging"
    - "task-management"
  # ✅ system prompt 中注入的发现指引（留空使用 hooks.py 中的默认模板）
  discovery_prompt: ""
  # ✅ LLM 增强（需要 Hermes v0.13.0+，v0.12.x 下自动跳过）
  llm:
    # 是否启用 LLM 增强（总开关）
    enabled: true
    # 创建技能时使用 LLM 补全 summary/triggers
    enrich_on_create: true
    # 编辑技能时使用 LLM 刷新 summary/triggers
    enrich_on_edit: true
    # 会话启动时对索引中缺少元数据的技能批量补全
    enrich_on_index: true
    # 每次会话启动最多补全的技能数量（避免延迟）
    max_enrich_per_session: 5
    # 单次 LLM 调用超时（秒），超时后降级到规则引擎
    timeout_seconds: 5.0
